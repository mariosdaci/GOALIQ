<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>GOALIQ</title>

  <style>
    body{
      margin:0;
      background:#0f0f0f;
      color:white;
      font-family:Arial, sans-serif;
    }

    .header{
      background:#ff7b00;
      padding:20px;
      text-align:center;
      font-size:32px;
      font-weight:bold;
      color:black;
    }

    .container{
      padding:20px;
    }

    .card{
      background:#1b1b1b;
      border-radius:20px;
      padding:20px;
      margin-bottom:20px;
      border:2px solid #ff7b00;
    }

    .match{
      display:flex;
      justify-content:space-between;
      align-items:center;
      font-size:24px;
      margin-top:15px;
    }

    .prediction{
      margin-top:15px;
      color:#ff7b00;
      font-size:20px;
      font-weight:bold;
    }

    .button{
      margin-top:20px;
      background:#ff7b00;
      color:black;
      padding:15px;
      text-align:center;
      border-radius:12px;
      font-weight:bold;
      cursor:pointer;
    }

    .footer{
      text-align:center;
      padding:20px;
      color:#777;
    }
  </style>
</head>

<body>

  <div class="header">
    GOALIQ ⚽
  </div>

  <div class="container">

    <div class="card">
      <h2>Live Match</h2>

      <div class="match">
        <span>Real Madrid</span>
        <span>2 - 1</span>
        <span>Barcelona</span>
      </div>

      <div class="prediction">
        AI Prediction: Real Madrid 68%
      </div>

      <div class="button">
        View Stats
      </div>
    </div>

    <div class="card">
      <h2>Top Players</h2>

      <p>🔥 Mbappé</p>
      <p>⚡ Haaland</p>
      <p>🎯 Bellingham</p>
    </div>

  </div>

  <div class="footer">
    GOALIQ 2026 ©
  </div>

</body>
</html>
